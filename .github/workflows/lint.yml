name: Lint Check

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install linters
        run: npm install -g htmlhint csslint jshint

      - name: Lint HTML
        run: |
          echo "=== HTML Check ==="
          find company-hp -name "*.html" -exec htmlhint {} +

      - name: Lint CSS
        run: |
          echo "=== CSS Check ==="
          find company-hp -name "*.css" -exec csslint --quiet {} +

      - name: Lint JavaScript
        run: |
          echo "=== JS Check ==="
          find company-hp -name "*.js" -exec jshint {} +
